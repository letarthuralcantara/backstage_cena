<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorar Músicos - Backstage Cena</title>
    <link rel="shortcut icon" href="../images/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Work Sans', sans-serif;
            min-height: 100vh;
            background-image: url('../images/background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #ffffff;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        .header {
            position: relative;
            z-index: 100;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid rgba(139, 92, 246, 0.4);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.7);
        }

        .logo-img { height: 50px; width: auto; }

        .header-actions { display: flex; gap: 20px; align-items: center; }

        .btn-back {
            padding: 10px 24px;
            background: rgba(139, 92, 246, 0.15);
            border: 2px solid rgba(139, 92, 246, 0.5);
            border-radius: 10px;
            color: #a78bfa;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back:hover {
            background: rgba(139, 92, 246, 0.3);
            border-color: #8b5cf6;
            transform: translateY(-2px);
        }

        .profile-trigger {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            border: 2px solid rgba(139, 92, 246, 0.5);
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: white;
            font-size: 0.9rem;
        }

        .profile-trigger:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.6);
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 30px;
        }

        .hero {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-title {
            font-family: 'Space Mono', monospace;
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: #d1d5db;
            font-weight: 300;
        }

        .total-count {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.4);
            border-radius: 30px;
            color: #a78bfa;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .search-filter-bar {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }

        .search-box {
            position: relative;
            margin-bottom: 25px;
        }

        .search-input {
            width: 100%;
            padding: 18px 50px 18px 60px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            font-family: 'Work Sans', sans-serif;
            transition: all 0.3s;
        }

        .search-input::placeholder { color: rgba(255, 255, 255, 0.4); }

        .search-input:focus {
            outline: none;
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #8b5cf6;
            font-size: 1.3rem;
        }

        .search-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            padding: 10px 25px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Work Sans', sans-serif;
        }

        .search-btn:hover {
            transform: translateY(-50%) scale(1.05);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.5);
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
        }

        .filter-group label {
            display: block;
            color: #9ca3af;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .filter-group select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            font-family: 'Work Sans', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-group select option { background: #1a1a1a; }

        .filter-group select:focus {
            outline: none;
            border-color: #8b5cf6;
        }

        .musicians-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .musician-card {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 16px;
            padding: 25px;
            display: flex;
            gap: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            animation: fadeIn 0.5s ease-out both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .musician-card:hover {
            border-color: rgba(139, 92, 246, 0.5);
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(139, 92, 246, 0.2);
        }

        .musician-photo {
            width: 70px;
            height: 70px;
            flex-shrink: 0;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.3rem;
            border: 2px solid rgba(139, 92, 246, 0.4);
        }

        .musician-info { flex: 1; min-width: 0; }

        .musician-name {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .musician-location {
            color: #9ca3af;
            font-size: 13px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .musician-bio {
            color: #d1d5db;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .musician-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 15px;
        }

        .tag {
            padding: 4px 10px;
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 12px;
            font-size: 12px;
            color: #a78bfa;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .view-profile-btn {
            width: 100%;
            padding: 10px;
            background: rgba(139, 92, 246, 0.15);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 8px;
            color: #a78bfa;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Work Sans', sans-serif;
        }

        .view-profile-btn:hover {
            background: rgba(139, 92, 246, 0.3);
            border-color: #8b5cf6;
        }

        .empty-state {
            display: none;
            text-align: center;
            padding: 80px 20px;
            color: #6b7280;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 20px;
            color: rgba(139, 92, 246, 0.3);
        }

        .empty-state h3 {
            font-size: 1.3rem;
            margin-bottom: 10px;
            color: #9ca3af;
        }

        @media (max-width: 768px) {
            .filters-grid { grid-template-columns: repeat(2, 1fr); }
            .hero-title { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html"><img src="../images/logo.png" alt="Backstage Logo" class="logo-img"> </a>
        <div class="header-actions">
            <a href="perfil.html" class="btn-back"><i class="fas fa-arrow-left"></i> Voltar</a>
            <a href="perfil.html" class="profile-trigger" id="profileTrigger"></a>
        </div>
    </header>

    <div class="container">
        <div class="hero">
            <h1 class="hero-title">Explorar Músicos</h1>
            <p class="hero-subtitle">Encontre parceiros para criar e colaborar</p>
            <span class="total-count" id="totalCount">Carregando...</span>
        </div>

        <div class="search-filter-bar">
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="Buscar por nome ou nome artístico...">
                <button class="search-btn" id="btnBuscar">Buscar</button>
            </div>

            <div class="filters-grid">
                <div class="filter-group">
                    <label>Cidade</label>
                    <select id="filtroCidade">
                        <option value="">Todas</option>
                        <option value="João Pessoa">João Pessoa</option>
                        <option value="Recife">Recife</option>
                        <option value="Natal">Natal</option>
                        <option value="Fortaleza">Fortaleza</option>
                        <option value="São Paulo">São Paulo</option>
                        <option value="Rio de Janeiro">Rio de Janeiro</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Instrumento</label>
                    <select id="filtroInstrumento">
                        <option value="">Todos</option>
                        <option value="Violão">Violão</option>
                        <option value="Guitarra">Guitarra</option>
                        <option value="Baixo">Baixo</option>
                        <option value="Bateria">Bateria</option>
                        <option value="Piano">Piano</option>
                        <option value="Vocal">Vocal</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Gênero</label>
                    <select id="filtroGenero">
                        <option value="">Todos</option>
                        <option value="Rock">Rock</option>
                        <option value="Pop">Pop</option>
                        <option value="MPB">MPB</option>
                        <option value="Jazz">Jazz</option>
                        <option value="Funk">Funk</option>
                        <option value="Hip-Hop">Hip-Hop</option>
                        <option value="Metal">Metal</option>
                        <option value="Forró">Forró</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Disponibilidade</label>
                    <select id="filtroDisponibilidade">
                        <option value="">Qualquer</option>
                        <option value="manha">Manhã</option>
                        <option value="tarde">Tarde</option>
                        <option value="noite">Noite</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Área</label>
                    <select id="filtroArea">
                        <option value="">Todas</option>
                        <option value="Vocalista">Vocalista</option>
                        <option value="Instrumentista">Instrumentista</option>
                        <option value="Produtor">Produtor</option>
                        <option value="Compositor">Compositor</option>
                        <option value="DJ">DJ</option>
                        <option value="Beatmaker">Beatmaker</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="musicians-grid" id="musiciansGrid"></div>
        <div class="empty-state" id="emptyState">
            <i class="fas fa-search"></i>
            <h3>Nenhum músico encontrado</h3>
            <p>Tente ajustar os filtros ou fazer uma nova busca</p>
        </div>
    </div>

    <!-- type="module" habilita import/export ES Modules -->
    <script type="module">
        import { iniciarPesquisa } from '../js/pesquisa.js';

        // Inicia a página (busca musicos.json e renderiza os cards)
        iniciarPesquisa();
    </script>
</body>
</html>
