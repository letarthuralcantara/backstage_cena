<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backstage | Meu Perfil</title>
    <link rel="shortcut icon" href="../imagens/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background-image: url('../imagens/background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #ffffff;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 0;
        }
        .header {
            position: relative; z-index: 100;
            padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        .logo-img { height: 50px; width: auto; }
        .header-actions { display: flex; gap: 20px; align-items: center; }
        .btn-explore {
            padding: 10px 24px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border: none; border-radius: 25px; color: white;
            text-decoration: none; font-size: 14px; font-weight: 600;
            transition: all 0.3s; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }
        .btn-explore:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6); }
        .profile-dropdown { position: relative; }
        .profile-trigger {
            width: 45px; height: 45px; border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 1rem; cursor: pointer;
            border: 2px solid rgba(139, 92, 246, 0.5); transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }
        .profile-trigger:hover { transform: scale(1.05); border-color: #8b5cf6; }
        .dropdown-menu {
            position: absolute; top: 60px; right: 0;
            background: rgba(26, 11, 46, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 15px; padding: 10px;
            min-width: 200px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            opacity: 0; visibility: hidden; transform: translateY(-10px);
            transition: all 0.3s;
        }
        .profile-dropdown.active .dropdown-menu { opacity: 1; visibility: visible; transform: translateY(0); }
        .dropdown-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; color: #d1d5db; text-decoration: none;
            border-radius: 10px; transition: all 0.3s; font-size: 14px; cursor: pointer;
        }
        .dropdown-item:hover { background: rgba(139, 92, 246, 0.2); color: #a78bfa; }
        .dropdown-item i { width: 20px; text-align: center; color: #8b5cf6; }
        .dropdown-divider { height: 1px; background: rgba(139, 92, 246, 0.2); margin: 8px 0; }
        .container { position: relative; z-index: 1; max-width: 1000px; margin: 50px auto; padding: 0 30px; }
        .profile-layout { display: grid; grid-template-columns: 280px 1fr; gap: 35px; align-items: start; }
        .profile-card {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px; padding: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            display: flex; flex-direction: column; align-items: stretch;
            position: sticky; top: 30px;
        }
        .avatar-container { position: relative; margin-bottom: 20px; align-self: center; }
        .avatar {
            width: 160px; height: 160px; border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; font-weight: 700;
            border: 4px solid rgba(139, 92, 246, 0.5);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
        }
        .profile-name { font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 5px; }
        .area-badge {
            display: none; align-self: center; margin-bottom: 20px;
            padding: 6px 16px; background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.4);
            border-radius: 20px; font-size: 13px; color: #a78bfa; font-weight: 500;
        }
        .area-badge:not(.hidden) { display: block; }
        .hidden { display: none !important; }
        .info-list { list-style: none; width: 100%; }
        .info-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.07); font-size: 14px; color: #d1d5db; }
        .info-item:last-child { border-bottom: none; }
        .info-item i { color: #8b5cf6; width: 16px; text-align: center; }
        .disp-section { margin-top: 20px; }
        .disp-title { font-size: 13px; color: #9ca3af; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .disp-tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .disp-tag { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.3); border-radius: 20px; font-size: 13px; color: #a78bfa; }
        .content-card {
            background: rgba(0,0,0,0.6); border: 1px solid rgba(139,92,246,0.2);
            border-radius: 16px; padding: 25px; margin-bottom: 25px;
            backdrop-filter: blur(8px); box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .card-header-left { display: flex; align-items: center; gap: 12px; }
        .card-icon { width: 40px; height: 40px; background: rgba(139,92,246,0.15); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #8b5cf6; font-size: 18px; }
        .card-title { font-family: 'Poppins', sans-serif; font-size: 18px; font-weight: 600; }
        .card-content { color: #d1d5db; line-height: 1.7; }
        .tags-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .tag { display: flex; align-items: center; gap: 6px; padding: 8px 14px; background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.3); border-radius: 20px; font-size: 14px; color: #a78bfa; }
        .empty-state { color: #6b7280; font-style: italic; font-size: 14px; }
        .btn-edit-card { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.3); border-radius: 8px; color: #a78bfa; text-decoration: none; font-size: 13px; transition: all 0.3s; }
        .btn-edit-card:hover { background: rgba(139,92,246,0.2); }
        footer { position: relative; z-index: 1; padding: 30px 0; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 50px; }
        .footer-content { max-width: 1000px; margin: 0 auto; padding: 0 30px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .footer-logo-img { height: 35px; opacity: 0.8; }
        .footer-text { color: rgba(255,255,255,0.5); font-size: 13px; }
        .footer-links { display: flex; gap: 20px; }
        .footer-link { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 13px; transition: color 0.3s; }
        .footer-link:hover { color: #8b5cf6; }
    </style>
</head>
<body>
    <header class="header">
        <img src="../imagens/logo.png" alt="Backstage Logo" class="logo-img">
        <div class="header-actions">
            <a href="pesquisar_usuarios.html" class="btn-explore">
                <i class="fas fa-compass"></i> Explorar Músicos
            </a>
            <div class="profile-dropdown" id="profileDropdown">
                <div class="profile-trigger" id="profileTrigger"></div>
                <div class="dropdown-menu">
                    <a href="perfil.html" class="dropdown-item"><i class="fas fa-user"></i> Meu Perfil</a>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" id="btnSair"><i class="fas fa-sign-out-alt"></i> Sair</div>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="profile-layout">
            <!-- CARD ESQUERDO -->
            <aside class="profile-card">
                <div class="avatar-container">
                    <div class="avatar" id="avatar"></div>
                </div>
                <h1 class="profile-name" id="nomeExibir"></h1>
                <span class="area-badge hidden" id="areaBadge"></span>

                <ul class="info-list">
                    <li class="info-item"><i class="fas fa-envelope"></i><span id="emailExibir"></span></li>
                    <li class="info-item"><i class="fas fa-map-marker-alt"></i><span id="localExibir"></span></li>
                    <li class="info-item hidden" id="telefoneRow"><i class="fas fa-phone"></i><span id="telefoneExibir"></span></li>
                    <li class="info-item hidden" id="bairroRow"><i class="fas fa-home"></i><span id="bairroExibir"></span></li>
                    <li class="info-item hidden" id="expRow"><i class="fas fa-star"></i><span id="expExibir"></span></li>
                </ul>

                <div class="disp-section hidden" id="dispSection">
                    <p class="disp-title">Disponibilidade</p>
                    <div class="disp-tags" id="dispTags"></div>
                </div>
            </aside>

            <!-- CONTEÚDO DIREITO -->
            <main>
                <div class="content-card">
                    <div class="card-header">
                        <div class="card-header-left">
                            <div class="card-icon"><i class="fas fa-user-circle"></i></div>
                            <h2 class="card-title">Descrição</h2>
                        </div>
                        <a href="#" class="btn-edit-card"><i class="fas fa-pen"></i> Editar</a>
                    </div>
                    <p class="card-content" id="bioExibir"></p>
                </div>

                <div class="content-card">
                    <div class="card-header">
                        <div class="card-header-left">
                            <div class="card-icon"><i class="fas fa-guitar"></i></div>
                            <h2 class="card-title">Talentos</h2>
                        </div>
                    </div>
                    <div id="talentosCont"></div>
                </div>

                <div class="content-card">
                    <div class="card-header">
                        <div class="card-header-left">
                            <div class="card-icon"><i class="fas fa-compact-disc"></i></div>
                            <h2 class="card-title">Gêneros Favoritos</h2>
                        </div>
                    </div>
                    <div id="generosCont"></div>
                </div>
            </main>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <img src="../imagens/logo.png" alt="Backstage Logo" class="footer-logo-img">
            <p class="footer-text">A cena musical independente começa aqui. &copy; 2025 Backstage Cena</p>
            <div class="footer-links">
                <a href="#" class="footer-link">Sobre</a>
                <a href="#" class="footer-link">Termos</a>
                <a href="#" class="footer-link">Privacidade</a>
                <a href="#" class="footer-link">Contato</a>
            </div>
        </div>
    </footer>

    <!-- type="module" habilita import/export ES Modules -->
    <script type="module">
        import { iniciarPerfil } from '../js/perfil.js';

        // Inicia a página de perfil (busca dados e popula o HTML)
        iniciarPerfil();
    </script>
</body>
</html>
