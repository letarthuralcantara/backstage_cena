<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Backstage Cena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="shortcut icon" href="../imagens/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: url('../images/background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }
        .login-card {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            padding: 50px 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .logo-container { text-align: center; margin-bottom: 40px; }
        .logo-img { width: 200px; height: auto; }
        .form-title {
            font-family: 'Poppins', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            text-align: center;
            margin-bottom: 10px;
        }
        .form-subtitle { text-align: center; color: #9ca3af; font-size: 14px; margin-bottom: 30px; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; color: #d1d5db; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #8b5cf6; font-size: 18px; }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 15px 15px 15px 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 10px;
            color: white;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }
        input[type="email"]:focus, input[type="password"]:focus {
            outline: none;
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.2);
        }
        .checkbox-group { display: flex; align-items: center; gap: 8px; margin-bottom: 25px; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .checkbox-group label { color: #d1d5db; font-size: 14px; cursor: pointer; }
        .btn-login {
            font-family: 'Inter', sans-serif;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-login:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.5); 
        }
        .erro-msg {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #f87171;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }
        .divider { 
            text-align: center; 
            margin: 30px 0; 
            position: relative; 
        }
        .divider::before { 
            content: ''; 
            position: absolute; 
            left: 0; 
            top: 50%; 
            width: 100%; 
            height: 1px; 
            background: rgba(139, 92, 246, 0.3); 
        }
        .divider span { 
            background: rgba(0, 0, 0, 0.85); 
            padding: 0 15px; 
            color: #9ca3af; 
            font-size: 13px; 
            position: relative; 
            z-index: 1; 
        }
        .signup-link { 
            text-align: center; 
            color: #9ca3af; 
            font-size: 14px; 
        }
        .signup-link a { 
            color: #8b5cf6; 
            text-decoration: none; 
            font-weight: 600; 
            transition: color 0.3s; 
        }
        .signup-link a:hover { 
            color: #a78bfa; 
        }
        .back-home { 
            text-align: center; 
            margin-top: 20px; 
        }
        .back-home a { 
            color: #9ca3af; 
            text-decoration: none; 
            font-size: 13px; 
            display: inline-flex; 
            align-items: center; 
            gap: 5px; 
            transition: color 0.3s; 
        }
        .back-home a:hover { 
            color: #8b5cf6; 
        }
        @media (max-width: 480px) {
            .login-card { 
                padding: 40px 30px; 
            }
            .logo-img { 
                width: 160px; 
            }
            .form-title { 
                font-size: 24px; 
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo-container">
                <a href="index.html"><img src="../images/logo.png" alt="Backstage Logo" class="logo-img"></a>
            </div>

            <h1 class="form-title">Bem-vindo de volta!</h1>
            <p class="form-subtitle">Entre para continuar sua jornada musical</p>

            <div class="erro-msg" id="erroMsg"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="senha" name="senha" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="lembrar" name="lembrar">
                    <label for="lembrar">Lembrar-me</label>
                </div>

                <button type="submit" class="btn-login">Entrar</button>
            </form>

            <div class="divider"><span>OU</span></div>

            <div class="signup-link">
                Não tem uma conta? <a href="cadastro.html">Cadastre-se</a>
            </div>

            <div class="back-home">
                <a href="index.html">
                    <i class="fas fa-arrow-left"></i>
                    Voltar para home
                </a>
            </div>
        </div>
    </div>

    <!-- type="module" habilita o uso de import/export ES Modules -->
    <script type="module">
        import { fazerLogin } from '../js/auth.js';

        const form = document.getElementById('loginForm');
        const erroMsg = document.getElementById('erroMsg');

        // Evento: submissão do formulário de login
        form.addEventListener('submit', (event) => {
            event.preventDefault(); // impede o recarregamento da página

            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;

            try {
                fazerLogin(email, senha);
                window.location.href = 'perfil.html';
            } catch (erro) {
                erroMsg.textContent = erro.message;
                erroMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
