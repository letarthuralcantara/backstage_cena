<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorar Músicos - Backstage Cena</title>
    <link rel="shortcut icon" href="../imagens/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Work Sans', sans-serif;
            min-height: 100vh;
            background-image: url('../imagens/background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #ffffff;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        /* HEADER */
        .header {
            position: relative;
            z-index: 100;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid rgba(139, 92, 246, 0.4);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.7);
        }

        .logo-img { height: 50px; width: auto; }

        .header-actions { display: flex; gap: 20px; align-items: center; }

        .btn-back {
            padding: 10px 24px;
            background: rgba(139, 92, 246, 0.15);
            border: 2px solid rgba(139, 92, 246, 0.5);
            border-radius: 10px;
            color: #a78bfa;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back:hover {
            background: rgba(139, 92, 246, 0.3);
            border-color: #8b5cf6;
            transform: translateY(-2px);
        }

        .profile-trigger {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            border: 2px solid rgba(139, 92, 246, 0.5);
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: white;
            font-size: 0.9rem;
        }

        .profile-trigger:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.6);
        }

        /* CONTAINER */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 30px;
        }

        /* HERO */
        .hero {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-title {
            font-family: 'Space Mono', monospace;
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: #d1d5db;
            font-weight: 300;
        }

        .total-count {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.4);
            border-radius: 30px;
            color: #a78bfa;
            font-size: 0.95rem;
            font-weight: 600;
        }

        /* SEARCH & FILTERS */
        .search-filter-bar {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }

        .search-box {
            position: relative;
            margin-bottom: 25px;
        }

        .search-input {
            width: 100%;
            padding: 18px 50px 18px 60px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            font-family: 'Work Sans', sans-serif;
            transition: all 0.3s;
        }

        .search-input::placeholder { color: rgba(255,255,255,0.4); }

        .search-input:focus {
            outline: none;
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #8b5cf6;
            font-size: 1.3rem;
        }

        .search-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            padding: 10px 25px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Work Sans', sans-serif;
        }

        .search-btn:hover {
            transform: translateY(-50%) scale(1.05);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.5);
        }

        .filters-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
        }

        .filter-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #9ca3af;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group label i { color: #8b5cf6; font-size: 0.9rem; }

        select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 10px;
            color: white;
            font-family: 'Work Sans', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
        }

        select:focus {
            outline: none;
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
        }

        select option { background: #1a0b2e; color: white; }

        /* GRID DE MÚSICOS */
        .musicians-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .musician-card {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            animation: slideUp 0.6s ease-out backwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .musician-card:nth-child(1) { animation-delay: 0.1s; }
        .musician-card:nth-child(2) { animation-delay: 0.15s; }
        .musician-card:nth-child(3) { animation-delay: 0.2s; }
        .musician-card:nth-child(4) { animation-delay: 0.25s; }
        .musician-card:nth-child(5) { animation-delay: 0.3s; }
        .musician-card:nth-child(6) { animation-delay: 0.35s; }

        .musician-card:hover {
            transform: translateY(-10px);
            border-color: #8b5cf6;
            box-shadow: 0 20px 50px rgba(139, 92, 246, 0.4);
            background: rgba(139, 92, 246, 0.1);
        }

        .musician-photo {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 700;
            color: white;
            position: relative;
            font-family: 'Space Mono', monospace;
        }

        .musician-photo::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 50%;
            background: linear-gradient(180deg, transparent, rgba(0,0,0,0.5));
        }

        .musician-info { padding: 25px; }

        .musician-name {
            font-family: 'Space Mono', monospace;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: #ffffff;
        }

        .musician-location {
            color: #9ca3af;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .musician-bio {
            color: #d1d5db;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .musician-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tag {
            padding: 5px 12px;
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.4);
            border-radius: 15px;
            font-size: 0.8rem;
            color: #a78bfa;
            font-weight: 500;
        }

        .view-profile-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            font-family: 'Work Sans', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .view-profile-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.5);
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            display: none;
        }

        .empty-state i {
            font-size: 5rem;
            color: rgba(139, 92, 246, 0.3);
            margin-bottom: 20px;
            display: block;
        }

        .empty-state h3 {
            font-family: 'Space Mono', monospace;
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #d1d5db;
        }

        .empty-state p { color: #9ca3af; }

        @media (max-width: 1200px) {
            .filters-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 768px) {
            .hero-title { font-size: 2rem; }
            .musicians-grid { grid-template-columns: 1fr; }
            .filters-grid { grid-template-columns: 1fr; }
            .header { padding: 15px 20px; }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <a href="index.html">
            <img src="../imagens/logo.png" alt="Backstage Logo" class="logo-img">
        </a>
        <div class="header-actions">
            <a href="perfil.html" class="btn-back">
                <i class="fas fa-arrow-left"></i>
                Meu Perfil
            </a>
            <a href="perfil.html" class="profile-trigger" id="profileTrigger"></a>
        </div>
    </header>

    <div class="container">
        <!-- HERO -->
        <div class="hero">
            <h1 class="hero-title">Descubra Artistas</h1>
            <p class="hero-subtitle">Conecte-se com músicos independentes de todo o Brasil</p>
            <span class="total-count" id="totalCount">0 músicos disponíveis</span>
        </div>

        <!-- SEARCH & FILTERS -->
        <div class="search-filter-bar">
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Buscar por nome ou nome artístico...">
                <button class="search-btn" onclick="filtrar()">Buscar</button>
            </div>

            <div class="filters-grid">
                <div class="filter-group">
                    <label><i class="fas fa-map-marker-alt"></i> Localização</label>
                    <select id="filtroCidade" onchange="filtrar()">
                        <option value="">Todas as cidades</option>
                        <option value="João Pessoa">João Pessoa</option>
                        <option value="Recife">Recife</option>
                        <option value="Natal">Natal</option>
                        <option value="Fortaleza">Fortaleza</option>
                        <option value="São Paulo">São Paulo</option>
                        <option value="Rio de Janeiro">Rio de Janeiro</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label><i class="fas fa-guitar"></i> Instrumento</label>
                    <select id="filtroInstrumento" onchange="filtrar()">
                        <option value="">Todos os instrumentos</option>
                        <option value="Violão">Violão</option>
                        <option value="Guitarra">Guitarra</option>
                        <option value="Baixo">Baixo</option>
                        <option value="Bateria">Bateria</option>
                        <option value="Piano">Piano</option>
                        <option value="Teclado">Teclado</option>
                        <option value="Saxofone">Saxofone</option>
                        <option value="Vocal">Vocal</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label><i class="fas fa-music"></i> Gênero Musical</label>
                    <select id="filtroGenero" onchange="filtrar()">
                        <option value="">Todos os gêneros</option>
                        <option value="Rock">Rock</option>
                        <option value="Pop">Pop</option>
                        <option value="MPB">MPB</option>
                        <option value="Samba">Samba</option>
                        <option value="Jazz">Jazz</option>
                        <option value="Funk">Funk</option>
                        <option value="Hip-Hop">Hip-Hop</option>
                        <option value="Metal">Metal</option>
                        <option value="Forró">Forró</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label><i class="fas fa-calendar-check"></i> Disponibilidade</label>
                    <select id="filtroDisponibilidade" onchange="filtrar()">
                        <option value="">Todas</option>
                        <option value="manha">Manhã</option>
                        <option value="tarde">Tarde</option>
                        <option value="noite">Noite</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label><i class="fas fa-briefcase"></i> Área de Atuação</label>
                    <select id="filtroArea" onchange="filtrar()">
                        <option value="">Todas as áreas</option>
                        <option value="Vocalista">Vocalista</option>
                        <option value="Instrumentista">Instrumentista</option>
                        <option value="Produtor">Produtor</option>
                        <option value="Compositor">Compositor</option>
                        <option value="DJ">DJ</option>
                        <option value="Beatmaker">Beatmaker</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- GRID -->
        <div class="musicians-grid" id="musiciansGrid"></div>

        <!-- EMPTY STATE -->
        <div class="empty-state" id="emptyState">
            <i class="fas fa-search"></i>
            <h3>Nenhum músico encontrado</h3>
            <p>Tente ajustar os filtros ou fazer uma nova busca</p>
        </div>
    </div>

    <script>
        // Dados mockados de músicos
        const musicos = [
            {
                nome: 'Lucas Vieira',
                nomeArtistico: 'LV Bass',
                cidade: 'João Pessoa',
                estado: 'PB',
                bio: 'Baixista com 8 anos de experiência em rock e MPB. Toco em bandas locais e faço sessões de estúdio.',
                instrumentos: ['Baixo', 'Contrabaixo'],
                generos: ['Rock', 'MPB'],
                area: 'Instrumentista',
                disponibilidade: ['tarde', 'noite'],
                iniciais: 'LV'
            },
            {
                nome: 'Mariana Costa',
                nomeArtistico: 'Mari Voz',
                cidade: 'Recife',
                estado: 'PE',
                bio: 'Vocalista e compositora. Já gravei com produtores independentes do nordeste e tenho EP lançado.',
                instrumentos: ['Vocal'],
                generos: ['Pop', 'Forró'],
                area: 'Vocalista',
                disponibilidade: ['manha', 'tarde'],
                iniciais: 'MV'
            },
            {
                nome: 'Felipe Drummond',
                nomeArtistico: 'DrumFX',
                cidade: 'Natal',
                estado: 'RN',
                bio: 'Baterista e beatmaker. Produzo beats trap e funk, disponível para colaborações online.',
                instrumentos: ['Bateria'],
                generos: ['Funk', 'Hip-Hop', 'Trap'],
                area: 'Beatmaker',
                disponibilidade: ['noite'],
                iniciais: 'FD'
            },
            {
                nome: 'Ana Luz',
                nomeArtistico: '',
                cidade: 'João Pessoa',
                estado: 'PB',
                bio: 'Pianista clássica com formação no conservatório. Aberta a fusões com jazz e música brasileira.',
                instrumentos: ['Piano', 'Teclado'],
                generos: ['Jazz', 'MPB', 'Clássica'],
                area: 'Instrumentista',
                disponibilidade: ['manha'],
                iniciais: 'AL'
            },
            {
                nome: 'Rafael Santos',
                nomeArtistico: 'RafaBeats',
                cidade: 'Fortaleza',
                estado: 'CE',
                bio: 'Produtor musical com home studio equipado. Trabalho com artistas de todos os gêneros.',
                instrumentos: [],
                generos: ['Hip-Hop', 'Trap', 'Pop'],
                area: 'Produtor',
                disponibilidade: ['tarde', 'noite'],
                iniciais: 'RB'
            },
            {
                nome: 'Isabela Melo',
                nomeArtistico: 'Bela Guitar',
                cidade: 'São Paulo',
                estado: 'SP',
                bio: 'Guitarrista de metal e rock. Faço covers, aulas e participações em bandas.',
                instrumentos: ['Guitarra'],
                generos: ['Metal', 'Rock'],
                area: 'Instrumentista',
                disponibilidade: ['noite'],
                iniciais: 'IG'
            },
            {
                nome: 'Carlos Menezes',
                nomeArtistico: 'DJ Menezes',
                cidade: 'Rio de Janeiro',
                estado: 'RJ',
                bio: 'DJ com mais de 10 anos em festas e eventos. Especializado em eletrônica e funk carioca.',
                instrumentos: [],
                generos: ['Funk', 'Eletrônica'],
                area: 'DJ',
                disponibilidade: ['noite'],
                iniciais: 'CM'
            },
            {
                nome: 'Thaís Oliveira',
                nomeArtistico: 'Tha Compositor',
                cidade: 'João Pessoa',
                estado: 'PB',
                bio: 'Compositora e multi-instrumentista. Escrevo letras e arranjos para artistas independentes.',
                instrumentos: ['Violão', 'Vocal'],
                generos: ['MPB', 'Samba', 'Pop'],
                area: 'Compositor',
                disponibilidade: ['manha', 'tarde'],
                iniciais: 'TO'
            }
        ];

        // Preencher iniciais do header com o usuário logado
        const usuario = JSON.parse(localStorage.getItem('usuarioLogado'));
        if (usuario) {
            const nome = usuario.nome_artistico || usuario.nome_completo || usuario.nome || '';
            document.getElementById('profileTrigger').textContent = nome.substring(0, 2).toUpperCase();
        } else {
            document.getElementById('profileTrigger').textContent = '?';
        }

        function criarCard(musico) {
            const nomeExibir = musico.nomeArtistico || musico.nome;
            const tags = [...musico.instrumentos, ...musico.generos].slice(0, 5);

            const tagsHTML = tags.map(t =>
                `<span class="tag"><i class="fas fa-music"></i> ${t}</span>`
            ).join('');

            const card = document.createElement('div');
            card.className = 'musician-card';
            card.innerHTML = `
                <div class="musician-photo">${musico.iniciais}</div>
                <div class="musician-info">
                    <h3 class="musician-name">${nomeExibir}</h3>
                    <p class="musician-location">
                        <i class="fas fa-map-marker-alt"></i>
                        ${musico.cidade}, ${musico.estado}
                    </p>
                    ${musico.bio ? `<p class="musician-bio">${musico.bio}</p>` : ''}
                    <div class="musician-tags">${tagsHTML}</div>
                    <button class="view-profile-btn">Ver Perfil Completo</button>
                </div>
            `;
            return card;
        }

        function filtrar() {
            const busca = document.getElementById('searchInput').value.toLowerCase();
            const cidade = document.getElementById('filtroCidade').value;
            const instrumento = document.getElementById('filtroInstrumento').value;
            const genero = document.getElementById('filtroGenero').value;
            const disponibilidade = document.getElementById('filtroDisponibilidade').value;
            const area = document.getElementById('filtroArea').value;

            const resultado = musicos.filter(m => {
                const nomeExibir = (m.nomeArtistico || m.nome).toLowerCase();
                if (busca && !nomeExibir.includes(busca) && !m.nome.toLowerCase().includes(busca)) return false;
                if (cidade && m.cidade !== cidade) return false;
                if (instrumento && !m.instrumentos.includes(instrumento)) return false;
                if (genero && !m.generos.includes(genero)) return false;
                if (disponibilidade && !m.disponibilidade.includes(disponibilidade)) return false;
                if (area && m.area !== area) return false;
                return true;
            });

            renderizar(resultado);
        }

        function renderizar(lista) {
            const grid = document.getElementById('musiciansGrid');
            const empty = document.getElementById('emptyState');

            grid.innerHTML = '';

            if (lista.length === 0) {
                empty.style.display = 'block';
                document.getElementById('totalCount').textContent = '0 músicos disponíveis';
                return;
            }

            empty.style.display = 'none';
            document.getElementById('totalCount').textContent = `${lista.length} músico${lista.length !== 1 ? 's' : ''} disponíve${lista.length !== 1 ? 'is' : 'l'}`;

            lista.forEach((m, i) => {
                const card = criarCard(m);
                card.style.animationDelay = `${0.1 + i * 0.05}s`;
                grid.appendChild(card);
            });
        }

        // Enter no campo de busca
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') filtrar();
        });

        // Inicializar
        renderizar(musicos);
    </script>
</body>
</html>
